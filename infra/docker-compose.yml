# Self-host stack: SpecBoard web + Postgres. The hosted SaaS instead uses
# Supabase (Postgres + Auth + RLS) — see infra/supabase/.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: specboard
    ports:
      - "5432:5432"
    volumes:
      - specboard_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: infra/web.Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/specboard
      # Single-workspace self-host: auth/SSO are commercial add-ons.
      SPECBOARD_SELF_HOST: "true"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  specboard_db:
